const DB = {
  async getRequests() {
    const {data,error} = await sb.from('requests').select('*').order('created_at',{ascending:false});
    return error ? [] : data;
  },
  async insertRequest(row) {
    const {data,error} = await sb.from('requests').insert([row]).select().single();
    return {data,error};
  },
  async updateRequest(id, updates) {
    const {error} = await sb.from('requests').update(updates).eq('id',id);
    return {error};
  },
  async getSettings() {
    const {data} = await sb.from('settings').select('*');
    const map = {};
    (data||[]).forEach(r => map[r.key] = r.value);
    return map;
  },
  async saveSetting(key, value) {
    await sb.from('settings').update({value, updated_at: new Date().toISOString()}).eq('key',key);
  }
};

// City search component
const CitySearch = ({label, value, displayValue, onChange, placeholder}) => {
  const [query, setQuery] = useState(displayValue || '');
  const [open, setOpen] = useState(false);
  const [results, setResults] = useState([]);

  useEffect(() => { setQuery(displayValue || ''); }, [displayValue]);

  const search = (q) => {
    setQuery(q);
    if (q.length < 1) { setResults([]); setOpen(false); return; }
    const lower = q.toLowerCase();
    const matches = AIRPORTS.filter(a =>
      a.he.includes(q) || a.en.toLowerCase().includes(lower) || a.iata.toLowerCase().includes(lower)
    ).slice(0, 8);
    setResults(matches);
    setOpen(matches.length > 0);
  };

  const select = (airport) => {
    setQuery(`${airport.he} (${airport.iata})`);
    onChange(airport.iata, `${airport.he} (${airport.iata})`);
    setOpen(false);
  };

  return (
    <div style={{position:'relative'}}>
      <span className="lbl">{label}</span>
      <input
        placeholder={placeholder || 'הקלד עיר בעברית...'}
        value={query}
        onChange={e => search(e.target.value)}
        onFocus={() => { if(results.length) setOpen(true); }}
        onBlur={() => setTimeout(()=>setOpen(false), 200)}
      />
      {open && <div style={{position:'absolute',top:'100%',left:0,right:0,zIndex:50,background:'#13131a',border:'1px solid #1e1e2e',borderRadius:12,marginTop:4,maxHeight:220,overflow:'auto',boxShadow:'0 8px 32px rgba(0,0,0,.5)'}}>
        {results.map(a => (
          <div key={a.iata} onMouseDown={()=>select(a)}
               style={{padding:'10px 14px',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center',borderBottom:'1px solid #1e1e2e20',transition:'background .1s'}}
               onMouseEnter={e=>e.currentTarget.style.background='#1e1e2e'}
               onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
            <span style={{fontSize:14}}>{a.he}</span>
            <span style={{fontSize:12,color:'#f5a623',fontFamily:'monospace',fontWeight:700}}>{a.iata}</span>
          </div>
        ))}
      </div>}
    </div>
  );
};

    DB.getSettings().then(setSettings);

        const wa = f.whatsapp.replace(/^0/,'').replace(/[^0-9]/g,'');

      }
      // Trigger Make.com search webhook (include API keys so Make.com doesn't need to fetch them)

  useEffect(()=>{

  const login = () => {

    else alert('סיסמה שגויה');
  };

  const setStatus = async (id,status) => {
    const updates = {status};
    if(status==='sent') updates.sent_at = new Date().toISOString();
    if(status==='paid') updates.paid_at = new Date().toISOString();
    await DB.updateRequest(id, updates);
    setRequests(rs=>rs.map(r=>r.id===id?{...r,...updates}:r));
    if(sel?.id===id) setSel(s=>({...s,...updates}));
  };

  const saveNote = async () => {
    await DB.updateRequest(sel.id, {admin_notes:note});
    setRequests(rs=>rs.map(r=>r.id===sel.id?{...r,admin_notes:note}:r));
    setSel(s=>({...s,admin_notes:note}));
  };

  const saveSetting = async (key,val) => {
    await DB.saveSetting(key,val);
    setSettings(s=>({...s,[key]:val}));
  };

  const filtered = requests.filter(r =>
    tab==='all' ? true :
    tab==='pending' ? r.status==='pending' :
    tab==='active' ? ['searching','found','sent_price','awaiting_payment'].includes(r.status) :
    tab==='beat' ? r.type==='beat' :
    tab==='research' ? r.type==='research' :
    tab==='paid' ? ['paid','sent'].includes(r.status) : true
  );

  const stats = {
    total: requests.length,
    pending: requests.filter(r=>r.status==='pending').length,
    active: requests.filter(r=>['searching','found','sent_price','awaiting_payment'].includes(r.status)).length,
    paid: requests.filter(r=>['paid','sent'].includes(r.status)).length,
    revenue: requests.filter(r=>['paid','sent'].includes(r.status)).reduce((a,r)=>a+(r.amount_paid||parseInt(settings.service_price||'249')),0),
    today: requests.filter(r=>r.created_at?.startsWith(new Date().toISOString().slice(0,10))).length,
  };

  if(!authed) return (

      </div>
    </div>

          <span style={{fontSize:18,fontWeight:900}}>✈️ צייד טיסות</span>

        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="tab tab-off" onClick={()=>setView('requests')}>📋 בקשות</button>

        </div>
      </div>
      <div style={{maxWidth:600,margin:'32px auto',padding:'0 16px'}}>

            <button key={t.id} className={`tab ${tab===t.id?'tab-on':'tab-off'}`} onClick={()=>setTab(t.id)}>{t.l} ({
              t.id==='all'?requests.length:
              t.id==='pending'?requests.filter(r=>r.status==='pending').length:
              t.id==='active'?requests.filter(r=>['searching','found','sent_price','awaiting_payment'].includes(r.status)).length:
              t.id==='beat'?requests.filter(r=>r.type==='beat').length:
              t.id==='research'?requests.filter(r=>r.type==='research').length:

        <div style={{display:'flex',gap:16}}>
          <div className="card" style={{flex:1,overflow:'hidden'}}>

              <p style={{fontSize:11,color:'#6b7280',textAlign:'center'}}>שולח טיזר ללקוח ב-WhatsApp (ללא מחירים — רק אחרי תשלום)</p>
            </div>}
          </div>}
        </div>
      </div>
    </div>
  );
};

// ============ APP ROUTER ============
const App = () => {
  const [page, setPage] = useState('home');
  const [globalSettings, setGlobalSettings] = useState({});
  useEffect(()=>{ DB.getSettings().then(setGlobalSettings); },[]);
  const price = globalSettings.service_price || '249';
  const pages = {
    home: <Landing go={setPage} price={price}/>,
    beat: <FlightForm type="beat" go={setPage} price={price}/>,
    research: <FlightForm type="research" go={setPage} price={price}/>,
    admin: <Admin go={setPage}/>,
  };
  return pages[page] || pages.home;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
